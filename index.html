<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="code.png" type="image/x-icon" />
  <title>Void Clicker</title>
  <style>
    /* 1. Basic Page Setup */
    body, html {
      height: 100%;
      margin: 0;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden; 
    }

    /* 2. Menu Container */
    .container {
      display: flex;
      flex-direction: column; 
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      width: 100%;
    }

    /* 3. Button Styling */
    .my-button {
      padding: 15px 40px;
      font-size: 50px;
      cursor: pointer;
      background-color: #EFFF00;
      color: white;
      border: 1px solid #444;
      border-radius: 10px;
      transition: background-color 0.3s, transform 0.2s;
      width: 300px;
    }

    .my-button:hover {
      background-color: #333;
      transform: scale(1.05);
    }

    .play-btn {
      margin-top: 70vh; /* Adjusted slightly for better visibility */
    }

    .credits-btn {
      margin-top: 20px; 
    }

    /* 4. Overlay & Fade Animation */
    .overlay {
      display: none; 
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      z-index: 100;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .overlay.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease-in-out forwards;
    }

    .overlay-content {
      text-align: center;
      max-width: 600px;
    }

    .overlay-content h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #fff;
    }

    .close-btn {
      margin-top: 40px;
      background: none;
      color: #888;
      border: 1px solid #444;
      padding: 10px 20px;
      cursor: pointer;
    }

    .close-btn:hover {
      color: white;
      border-color: white;
    }
  </style>
</head>
<body background-image: url('yo.png');>

  <!-- Main Menu -->
  <div class="container">
    <!-- Added missing closing quote to onclick -->
    <button class="my-button play-btn" onclick="location.href='./void.html'">Play</button>
    <button class="my-button credits-btn" onclick="toggleCredits(true)">Credits</button>
  </div>

  <!-- Credits Page Overlay -->
  <div id="creditsPage" class="overlay">
    <div class="overlay-content">
      <h1>CREDITS</h1>
      <p>Quantum — Developer</p>
      <!-- Fixed unclosed p tag -->
      <p>RXL — Game Tester</p>
      <p>Built with HTML, CSS, and JS</p>
      <!-- Fixed Close button text and closing tag -->
      <button class="close-btn" onclick="toggleCredits(false)">Close</button>
    </div>
  </div>

  <script>
    function toggleCredits(show) {
      const overlay = document.getElementById('creditsPage');
      if (show) {
        overlay.classList.add('active');
      } else {
        overlay.classList.remove('active');
      }
    }
  </script>

</body>
</html>
