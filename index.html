<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="code.png" type="image/x-icon" />
  <title>Void Clicker</title>
  <style>
    body {
      background-image: url("yo.png"); 
      background-color: black; /* Fallback color */
      height: 100%;
      margin: 0;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden; 
    }

    .container {
      display: flex;
      flex-direction: column; 
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
      width: 100%;
    }

    .my-button {
      padding: 15px 40px;
      font-size: 50px;
      cursor: pointer;
      background-color: #EFFF00;
      color: black; /* Changed to black for readability */
      border: 1px solid #444;
      border-radius: 10px;
      transition: background-color 0.3s, transform 0.2s;
      width: 400px; /* Increased slightly to fit text */
    }

    .my-button:hover {
      background-color: #333;
      color: white;
      transform: scale(1.05);
    }

    .play-btn {
      margin-top: 70vh; 
    }

    .credits-btn {
      margin-top: 20px; 
    }

    .overlay {
      display: none; 
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.95);
      z-index: 100;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .overlay.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.5s ease-in-out forwards;
    }

    .close-btn {
      margin-top: 40px;
      background: none;
      color: #888;
      border: 2px solid #CFFF04; /* Fixed the border syntax */
      border-radius: 4px;
      padding: 10px 20px;
      cursor: pointer;
    }

    .main-title {
      font-size: clamp(50px, 15vw, 200px); /* Responsive sizing */
      position: absolute; 
      top: 25%; 
      left: 50%; 
      transform: translateX(-50%); 
      margin: 0; 
      white-space: nowrap;
      pointer-events: none; /* Allows clicking buttons underneath */
    }
  </style>
</head>
<body>

  <div class="container">
    <button class="my-button play-btn" onclick="location.href='./void.html'">Play</button>
    <button class="my-button credits-btn" onclick="toggleCredits(true)">Credits</button>
  </div>

  <h1 class="main-title">Void Clicker</h1>

  <div id="creditsPage" class="overlay">
    <div class="overlay-content" style="text-align: center;">
      <h1 style="font-size: 3rem;">CREDITS</h1>
      <p>Quantum — Developer</p>
      <p>RXL — Game Tester</p>
      <p>Built with HTML, CSS, and JS</p>
      <button class="close-btn" onclick="toggleCredits(false)">Close</button>
    </div>
  </div>

  <script>
    function toggleCredits(show) {
      const overlay = document.getElementById('creditsPage');
      if (show) {
        overlay.classList.add('active');
      } else {
        overlay.classList.remove('active');
      }
    }
  </script>
</body>
</html>
