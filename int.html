<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Clicker | Main Menu</title>
    <style>
        :root { --void-purple: #8A2BE2; --deep-black: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--deep-black); font-family: 'Segoe UI', sans-serif; }
        
        /* Particle Background Effect */
        #void-bg { position: fixed; width: 100%; height: 100%; z-index: -1; }

        .menu-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(138, 43, 226, 0.15) 0%, transparent 70%);
        }

        .title-container { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 5rem; color: white; margin: 0; letter-spacing: 15px; text-transform: uppercase; text-shadow: 0 0 20px var(--void-purple); }
        .version-tag { color: var(--void-purple); font-weight: bold; letter-spacing: 2px; }

        .button-stack { display: flex; flex-direction: column; gap: 20px; width: 300px; }
        .menu-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--void-purple);
            color: white;
            padding: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            text-align: center;
        }

        .menu-btn:hover { background: var(--void-purple); color: black; box-shadow: 0 0 30px var(--void-purple); transform: scale(1.05); }

        /* Quick Stats Panel */
        .save-preview {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(0,0,0,0.8);
            border-left: 4px solid var(--void-purple);
            padding: 15px;
            min-width: 200px;
        }
        .save-preview h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--void-purple); }
        .save-preview p { margin: 5px 0; font-size: 1.1rem; }
    </style>
</head>
<body>

    <canvas id="void-bg"></canvas>

    <div class="menu-wrapper">
        <div class="title-container">
            <div class="version-tag">UPD 2.35</div>
            <h1>Void Clicker</h1>
        </div>

        <div class="button-stack">
            <a href="game.html" class="menu-btn">Enter Void</a>
            <button class="menu-btn" onclick="resetSave()">Reset Data</button>
            <button class="menu-btn" onclick="alert('Void Settings: Audio [OFF]')">Settings</button>
        </div>

        <div class="save-preview" id="preview">
            <h3>ACTIVE MANIFESTATION</h3>
            <p id="prev-clicks">Clicks: 0</p>
            <p id="prev-rebirths">Rebirths: 0</p>
        </div>
    </div>

<script>
    // Simple Particle Background
    const canvas = document.getElementById('void-bg');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            });
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#8A2BE2';
        particles.forEach(p => {
            p.y -= p.speed;
            if (p.y < 0) p.y = canvas.height;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    // Load LocalStorage Preview
    function loadPreview() {
        const clicks = localStorage.getItem("x") || 0;
        const rebirths = localStorage.getItem("rebirths") || 0;
        document.getElementById('prev-clicks').innerText = `Clicks: ${Math.floor(clicks)}`;
        document.getElementById('prev-rebirths').innerText = `Rebirths: ${rebirths}`;
    }

    function resetSave() {
        if(confirm("Erase your existence in the void? (Reset Data)")) {
            localStorage.clear();
            loadPreview();
        }
    }

    window.addEventListener('resize', init);
    init();
    animate();
    loadPreview();
</script>
</body>
</html>
